<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Витаминки">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF5F7">
<title>Мои витамины 💊</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(160deg, #FFF5F7 0%, #FEF3E2 30%, #F0F7FF 70%, #F5FFF5 100%);
    padding: 20px 14px 40px;
    -webkit-user-select: none;
    user-select: none;
  }

  .header { text-align: center; margin-bottom: 20px; animation: fadeIn 0.5s ease; }
  .header-emoji { font-size: 32px; margin-bottom: 4px; }
  .header h1 { font-size: 24px; font-weight: 800; color: #4A3728; letter-spacing: -0.5px; margin-bottom: 2px; }
  .header p { color: #A08B7A; font-size: 13px; font-weight: 600; }

  .today-card {
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    animation: fadeIn 0.6s ease;
    transition: background 0.4s ease;
  }
  .today-card.pending { background: linear-gradient(135deg, #FFF8E1, #FFECB3); }
  .today-card.done { background: linear-gradient(135deg, #D4EDDA, #C3E6CB); }
  .today-emoji { font-size: 28px; }
  .today-title { font-weight: 700; font-size: 15px; color: #4A3728; }
  .today-sub { font-size: 12px; color: #8B7355; font-weight: 600; }

  .progress-card {
    background: white;
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    animation: fadeIn 0.7s ease;
  }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-header span { font-size: 13px; font-weight: 700; }
  .progress-label { color: #4A3728; }
  .progress-pct { color: #A08B7A; }
  .progress-bg { height: 10px; background: #F0EBE5; border-radius: 10px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #F4B942, #E07B9B, #7BC67E);
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .tracker {
    background: white;
    border-radius: 20px;
    padding: 16px 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    animation: fadeIn 0.8s ease;
    overflow-x: auto;
  }

  .grid { display: grid; grid-template-columns: 90px repeat(7, 1fr); gap: 3px; }

  .day-header { text-align: center; font-size: 11px; font-weight: 800; color: #BEB3A6; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 6px; }
  .day-header.today { color: #E07B9B; }
  .day-num { font-size: 14px; font-weight: 700; color: #8B7A6B; margin-top: 2px; }
  .day-header.today .day-num { color: #E07B9B; }
  .today-dot { width: 5px; height: 5px; border-radius: 50%; background: #E07B9B; margin: 3px auto 0; }

  .supp-row { display: contents; }
  .supp-label {
    display: flex; align-items: center; gap: 5px; padding-left: 4px;
    font-size: 11px; font-weight: 700; color: #5A4A3A; line-height: 1.2;
  }
  .supp-label .emoji { font-size: 15px; }

  .cell {
    display: flex; justify-content: center; align-items: center;
    height: 40px; border-radius: 10px;
    cursor: pointer; transition: all 0.15s ease;
    border: 2px solid transparent;
  }
  .cell:active { transform: scale(0.9); }
  .cell.unchecked { background: #FAFAF8; }
  .cell.unchecked.is-today { background: #FFF5F0; border: 2px dashed #F0D9CC; }
  .cell.checked { border: 2px solid rgba(0,0,0,0.06); }
  .cell .check { font-size: 18px; }
  .cell .empty-box { width: 18px; height: 18px; border-radius: 6px; border: 2px solid #DDD5CC; }

  .divider { grid-column: 1 / -1; height: 1px; background: #F5F0EB; }

  .reset-wrap { text-align: center; margin-top: 18px; animation: fadeIn 1.2s ease; }
  .reset-btn {
    background: none; border: none; color: #C4B5A5;
    font-size: 12px; font-weight: 600; cursor: pointer;
    padding: 8px 16px; font-family: 'Nunito', sans-serif;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.3s ease; }
</style>
</head>
<body>

<div class="header">
  <h1>Мои витамины</h1>
  <p>Трекер на неделю</p>
</div>

<div class="today-card pending" id="todayCard">
  <span class="today-emoji" id="todayEmoji">💪</span>
  <div>
    <div class="today-title" id="todayTitle"></div>
    <div class="today-sub" id="todaySub"></div>
  </div>
</div>

<div class="progress-card">
  <div class="progress-header">
    <span class="progress-label">Прогресс за неделю</span>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
  <div class="progress-bg">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="tracker">
  <div class="grid" id="grid"></div>
</div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetWeek()">Сбросить неделю ↺</button>
</div>

<script>
const SUPPLEMENTS = [
  { id: "iodine", name: "Йод", emoji: "🫧", color: "#5B9BD5" },
  { id: "vitd", name: "Витамин D", emoji: "☀️", color: "#F4B942" },
  { id: "terraxin", name: "Терраксин", emoji: "💊", color: "#7BC67E" },
  { id: "folic", name: "Фолиевая", emoji: "🌿", color: "#E07B9B" },
  { id: "fishoil", name: "Рыбий жир", emoji: "🐟", color: "#64B5C6" },
];
const DAYS = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

function getWeekKey() {
  const now = new Date();
  const d = new Date(now);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return `vit-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekDates() {
  const now = new Date();
  const d = new Date(now);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return Array.from({length:7}, (_,i) => {
    const x = new Date(d);
    x.setDate(d.getDate()+i);
    return x.getDate();
  });
}

function getTodayIdx() {
  const day = new Date().getDay();
  return day === 0 ? 6 : day - 1;
}

const weekKey = getWeekKey();
const dates = getWeekDates();
const todayIdx = getTodayIdx();
let checked = {};

function load() {
  try {
    const raw = localStorage.getItem(weekKey);
    if (raw) checked = JSON.parse(raw);
  } catch {}
}

function save() {
  try { localStorage.setItem(weekKey, JSON.stringify(checked)); } catch {}
}

function toggle(suppId, dayIdx) {
  const key = `${suppId}-${dayIdx}`;
  if (checked[key]) { delete checked[key]; } else { checked[key] = true; }
  save();
  render();

  const cell = document.getElementById(`cell-${key}`);
  if (cell) { cell.classList.remove('pop'); void cell.offsetWidth; cell.classList.add('pop'); }
}

function updateToday() {
  const count = SUPPLEMENTS.filter(s => checked[`${s.id}-${todayIdx}`]).length;
  const done = count === SUPPLEMENTS.length;
  const card = document.getElementById('todayCard');
  card.className = `today-card ${done ? 'done' : 'pending'}`;
  document.getElementById('todayEmoji').textContent = done ? '✨' : '💪';
  document.getElementById('todayTitle').textContent = done ? 'Всё выпила сегодня!' : `Сегодня: ${count} из ${SUPPLEMENTS.length}`;
  document.getElementById('todaySub').textContent = done ? 'Молодец, мамочка! 🎉' : 'Не забудь выпить остальное 🤍';
}

function updateProgress() {
  const total = Object.keys(checked).length;
  const possible = SUPPLEMENTS.length * 7;
  const pct = possible > 0 ? Math.round((total / possible) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function render() {
  updateToday();
  updateProgress();

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Header row
  const corner = document.createElement('div');
  grid.appendChild(corner);

  DAYS.forEach((day, i) => {
    const el = document.createElement('div');
    el.className = `day-header ${i === todayIdx ? 'today' : ''}`;
    el.innerHTML = `${day}`;
    grid.appendChild(el);
  });

  SUPPLEMENTS.forEach((supp, si) => {
    if (si > 0) {
      const div = document.createElement('div');
      div.className = 'divider';
      grid.appendChild(div);
    }

    const label = document.createElement('div');
    label.className = 'supp-label';
    label.innerHTML = `<span class="emoji">${supp.emoji}</span><span>${supp.name}</span>`;
    grid.appendChild(label);

    for (let di = 0; di < 7; di++) {
      const key = `${supp.id}-${di}`;
      const isChecked = !!checked[key];
      const cell = document.createElement('div');
      cell.id = `cell-${key}`;
      cell.className = `cell ${isChecked ? 'checked' : 'unchecked'} ${di === todayIdx ? 'is-today' : ''}`;
      if (isChecked) {
        cell.style.background = supp.color + '18';
        cell.style.borderColor = supp.color + '40';
      }
      cell.innerHTML = isChecked ? '<span class="check">✅</span>' : '<div class="empty-box"></div>';
      cell.onclick = () => toggle(supp.id, di);
      grid.appendChild(cell);
    }
  });
}

function resetWeek() {
  if (confirm('Сбросить все отметки за эту неделю?')) {
    checked = {};
    save();
    render();
  }
}

load();
render();
</script>
</body>
</html>
